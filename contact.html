<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000000;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 40px;
            margin-top: 50px;
            border-radius: 12px;
            box-shadow: 0 0 12px #b74b4b;
        }

        h1 {
            color: #b74b4b;
            margin-bottom: 10px;
        }

        .info-box {
            background: #e9f3ff;
            padding: 18px;
            border-left: 5px solid #b74b4b;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 16px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            background: #b74b4b;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #b74b4b;
        }

        a.back-btn {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #444;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Contact Me</h1>
    <p>Feel free to reach out using the details or form below.</p>
    <hr><br>

    <!-- Contact Info Box -->
    <div class="info-box">
        <p><strong>Email:</strong> joeljonainan04@email.com</p>
        <p><strong>Phone:</strong> 63..3.0.34</p>
        <p><strong>Address:</strong> Mangaluru, India</p>
    </div>
    <br>
    <a class="back-btn" href="index.html">Back</a>

</div>

</body>
</html>
